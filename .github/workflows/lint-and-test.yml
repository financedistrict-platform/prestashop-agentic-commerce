name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} — ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        module: [fdpsucp, fdpsprism]
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - name: Install dependencies
        working-directory: modules/${{ matrix.module }}
        run: composer install --no-interaction --prefer-dist
      - name: Run unit tests
        working-directory: modules/${{ matrix.module }}
        run: vendor/bin/phpunit --testdox

  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Check syntax
        run: |
          find modules -path '*/vendor/*' -prune -o -name '*.php' -print0 \
            | xargs -0 -n 50 php -l > /dev/null
